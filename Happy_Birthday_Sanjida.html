<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Sanjida 💖</title>
    <style>
        :root {
            --rose-pink: #ff4d6d;
            --deep-purple: #240046;
            --soft-pink: #ffccd5;
            --neon-glow: rgba(255, 77, 109, 0.6);
            --bg-dark: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Cinematic Intro Overlay */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease-in-out;
        }

        .intro-text {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--soft-pink);
            opacity: 0;
            position: absolute;
            text-align: center;
            text-shadow: 0 0 20px var(--neon-glow);
        }

        /* Main UI */
        #main-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease-in;
            transform: scale(1.1);
        }

        .birthday-title {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, var(--rose-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .sub-title {
            font-family: 'Brush Script MT', cursive;
            font-size: 1.8rem;
            color: var(--soft-pink);
            opacity: 0.8;
            animation: breathe 4s infinite ease-in-out;
        }

        .interaction-hint {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
            z-index: 20;
            animation: pulse 2s infinite;
        }

        /* Background Effects */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 5;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; filter: blur(0px); }
            50% { transform: scale(1.05); opacity: 1; filter: blur(1px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }

        /* Ending Overlay */
        #outro-overlay {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
        }
        
        .futuristic-font {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text" id="intro-1">For Someone Special 💖</div>
        <div class="intro-text" id="intro-2">My Love... My Life...</div>
        <div class="intro-text" id="intro-3">My Sanji 💕</div>
    </div>

    <div class="vignette"></div>
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="main-ui">
        <h1 class="birthday-title">Happy Birthday<br>Sanjida 🎂💖</h1>
        <p class="sub-title">Amar Bou Jan</p>
    </div>

    <div class="interaction-hint" id="hint">Tap for Magic ✨</div>

    <div id="outro-overlay">
        <span class="futuristic-font">Qalpik - AI Anime Stories. Follow for more!</span>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const phrases = [
            "Bow Jan 💖", "Amar Kolija ❤️", "Sanji 💕", "Love You 🥀", 
            "My Queen 👑", "Only You 💞", "Amar Shob 💖", "Tumi Amar 🌙", 
            "Valobashi ❤️", "Forever Us ♾️", "My Heart 💘", "Endless Love 💖", 
            "18 April 💖", "My Wife 👑", "Amar Bou ❤️"
        ];

        let width, height;
        let particles = [];
        let rainText = [];
        let hearts = [];
        let mouse = { x: 0, y: 0 };
        let tilt = { x: 0, y: 0 };
        let isStarted = false;

        // Resize handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Device Orientation for Parallax
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.body.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission();
            }, { once: true });
        }

        window.addEventListener('deviceorientation', (e) => {
            tilt.x = (e.gamma || 0) / 20; // range ~ -2 to 2
            tilt.y = (e.beta || 0) / 20;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.color = `hsla(${Math.random() * 30 + 340}, 100%, 70%, ${this.alpha})`;
            }
            update() {
                this.x += this.speedX + tilt.x * 0.5;
                this.y += this.speedY + tilt.y * 0.5;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
        }

        class RainText {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // Start at random Y
            }
            reset() {
                this.x = Math.random() * width;
                this.y = -50;
                this.text = phrases[Math.floor(Math.random() * phrases.length)];
                this.speed = Math.random() * 1 + 0.5;
                this.fontSize = Math.random() * 12 + 10;
                this.opacity = 0;
                this.maxOpacity = Math.random() * 0.4 + 0.1;
                this.rotation = (Math.random() - 0.5) * 0.2;
            }
            update() {
                this.y += this.speed;
                if (this.y < height * 0.2) this.opacity += 0.01;
                if (this.y > height * 0.8) this.opacity -= 0.01;
                
                if (this.y > height || this.opacity <= 0 && this.y > height * 0.5) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + (tilt.x * 20), this.y + (tilt.y * 20));
                ctx.rotate(this.rotation);
                ctx.font = `${this.fontSize}px serif`;
                ctx.fillStyle = `rgba(255, 204, 213, ${this.opacity})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "rgba(255, 77, 109, 0.5)";
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        class Heart {
            constructor(x, y, isExplosion = false) {
                this.x = x || Math.random() * width;
                this.y = y || height + 50;
                this.size = isExplosion ? Math.random() * 15 + 5 : Math.random() * 20 + 10;
                this.speedY = isExplosion ? (Math.random() - 0.5) * 10 : -Math.random() * 2 - 1;
                this.speedX = isExplosion ? (Math.random() - 0.5) * 10 : (Math.random() - 0.5) * 1;
                this.opacity = 1;
                this.life = isExplosion ? 1 : 1000;
                this.symbol = ["💖", "💕", "❤️", "🥀", "💗"][Math.floor(Math.random() * 5)];
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + tilt.x;
                if (this.life < 1000) {
                    this.opacity -= 0.02;
                    this.speedY *= 0.96;
                    this.speedX *= 0.96;
                }
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.symbol, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        function init() {
            for (let i = 0; i < 60; i++) particles.push(new Particle());
            for (let i = 0; i < 15; i++) rainText.push(new RainText());
            animate();
            runIntro();
        }

        function runIntro() {
            const delay = 1500;
            const t1 = document.getElementById('intro-1');
            const t2 = document.getElementById('intro-2');
            const t3 = document.getElementById('intro-3');
            const overlay = document.getElementById('intro-overlay');
            const ui = document.getElementById('main-ui');

            setTimeout(() => { t1.style.opacity = 1; t1.style.transition = "opacity 1.5s"; }, 500);
            setTimeout(() => { t1.style.opacity = 0; }, 500 + delay);
            
            setTimeout(() => { t2.style.opacity = 1; t2.style.transition = "opacity 1.5s"; }, 1000 + delay);
            setTimeout(() => { t2.style.opacity = 0; }, 1000 + delay * 2);

            setTimeout(() => { t3.style.opacity = 1; t3.style.transition = "opacity 1.5s"; }, 1500 + delay * 2);
            setTimeout(() => { t3.style.opacity = 0; }, 1500 + delay * 3);

            setTimeout(() => { 
                overlay.style.opacity = 0;
                setTimeout(() => overlay.style.display = 'none', 2000);
                ui.style.opacity = 1;
                ui.style.transform = "scale(1)";
                isStarted = true;
            }, 2000 + delay * 3);
        }

        function animate() {
            // Animated Gradient Background
            let time = Date.now() * 0.001;
            let grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            grad.addColorStop(0, '#1a001a');
            grad.addColorStop(0.5, '#050505');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // Fog effect (subtle)
            ctx.fillStyle = `rgba(36, 0, 70, ${0.05 + Math.sin(time)*0.02})`;
            ctx.fillRect(0, 0, width, height);

            rainText.forEach(t => { t.update(); t.draw(); });
            particles.forEach(p => { p.update(); p.draw(); });
            
            if (Math.random() < 0.03) hearts.push(new Heart());
            hearts.forEach((h, index) => {
                h.update();
                h.draw();
                if (h.y < -100 || h.opacity <= 0) hearts.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        // Voice and Audio System
        async function playBirthdayVoice() {
            // First attempt Web Audio API synthesized voice for high quality emotional tone
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = "Happy Birthday Sanjida... Amar Bow Jan... Ami tomake onek valobashi";
                msg.rate = 0.8;
                msg.pitch = 1.2;
                msg.volume = 1;
                // Try to find a soft female voice
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google UK English Female') || v.name.includes('Samantha'));
                if (femaleVoice) msg.voice = femaleVoice;
                window.speechSynthesis.speak(msg);
            }
        }

        // Interaction Handler
        window.addEventListener('touchstart', handleInteraction);
        window.addEventListener('mousedown', handleInteraction);

        function handleInteraction(e) {
            if (!isStarted) return;
            
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;

            // Heart explosion
            for (let i = 0; i < 10; i++) {
                hearts.push(new Heart(x, y, true));
            }

            // Haptic feedback
            if (navigator.vibrate) navigator.vibrate(20);

            // Play voice only once on first tap
            if (!window.audioPlayed) {
                playBirthdayVoice();
                document.getElementById('hint').style.opacity = 0;
                window.audioPlayed = true;

                // Show ending overlay after interaction
                setTimeout(() => {
                    const outro = document.getElementById('outro-overlay');
                    outro.style.opacity = 1;
                    setTimeout(() => outro.style.opacity = 0, 1500);
                }, 3000);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
